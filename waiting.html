<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 준비 중 — talkey</title>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-47VC83BZ12"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-47VC83BZ12');
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --warm-black:  #1C1714;
      --white:       #FFFFFF;
      --cream:       #FDFAF7;
      --beige-50:    #F5EDE5;
      --beige-100:   #EDE0D5;
      --border:      #E0D3C6;
      --text-1:      #1C1714;
      --text-2:      #6E5E56;
      --text-3:      #AA968C;
      --rose:        #BF6F86;
      --rose-dark:   #A05870;
      --rose-light:  #F7EAF0;
      --rose-mid:    #E8B8C8;
      --font: 'Pretendard', -apple-system, 'Noto Sans KR', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background: var(--beige-50);
      color: var(--text-1);
      min-height: 100svh;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 54px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--beige-50); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--text-1);
      font-size: 16px; transition: background 0.15s;
    }
    .back-btn:hover { background: var(--beige-100); }
    .header-logo {
      font-size: 17px; font-weight: 800; letter-spacing: -0.4px;
      color: var(--rose);
    }

    /* ── MAIN ── */
    .page {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 20px 64px;
      text-align: center;
    }

    /* 아이콘 블록 */
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 22px;
      background: var(--white);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 6px 20px rgba(140,80,80,0.08);
      animation: floatY 3.5s ease-in-out infinite;
    }
    .icon-wrap svg {
      width: 30px; height: 30px;
      fill: none; stroke: var(--rose);
      stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round;
    }

    /* 뱃지 */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--rose-light);
      border: 1px solid var(--rose-mid);
      border-radius: 100px; padding: 6px 14px;
      font-size: 12px; color: var(--rose); font-weight: 600;
      margin-bottom: 20px; letter-spacing: -0.1px;
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--rose);
      animation: pulse 2s ease infinite;
    }

    /* 타이틀 */
    h1 {
      font-size: clamp(22px, 5.5vw, 30px); font-weight: 800;
      margin-bottom: 12px; line-height: 1.25; letter-spacing: -1px;
      color: var(--text-1);
    }
    h1 em {
      font-style: normal;
      color: var(--rose);
    }

    .desc {
      font-size: 14.5px; color: var(--text-2); line-height: 1.8;
      max-width: 320px; margin: 0 auto 36px;
      letter-spacing: -0.15px;
    }
    .desc b { color: var(--text-1); font-weight: 700; }

    /* ── 폼 카드 ── */
    .form-card {
      width: 100%; max-width: 400px;
      background: var(--white);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: 0 4px 20px rgba(140,80,80,0.06);
    }
    .form-title {
      font-size: 14.5px; font-weight: 700; letter-spacing: -0.3px;
      margin-bottom: 20px; color: var(--text-1);
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12.5px; font-weight: 600;
      color: var(--text-2); margin-bottom: 6px; letter-spacing: -0.1px;
    }
    .field input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14.5px; font-family: var(--font);
      outline: none; background: var(--beige-50);
      color: var(--text-1);
      transition: border-color 0.15s, background 0.15s;
      letter-spacing: -0.2px;
    }
    .field input:focus {
      border-color: var(--rose-mid);
      background: var(--white);
    }
    .field input::placeholder { color: var(--text-3); }

    .submit-btn {
      width: 100%;
      background: var(--rose);
      color: #fff; border: none; border-radius: 11px;
      padding: 15px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: var(--font);
      box-shadow: 0 6px 18px rgba(191,111,134,0.35);
      transition: background 0.15s, transform 0.12s;
      margin-top: 4px; letter-spacing: -0.2px;
    }
    .submit-btn:hover { background: var(--rose-dark); transform: translateY(-1px); }
    .submit-btn:active { transform: scale(0.98); }

    .form-note {
      font-size: 11.5px; color: var(--text-3);
      margin-top: 12px; line-height: 1.65; letter-spacing: -0.1px;
    }

    /* ── 성공 카드 ── */
    .success-card {
      width: 100%; max-width: 400px;
      background: var(--white);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(140,80,80,0.06);
      display: none;
    }
    .success-icon-wrap {
      width: 64px; height: 64px; border-radius: 18px;
      background: var(--rose-light);
      border: 1px solid var(--rose-mid);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon-wrap svg {
      width: 28px; height: 28px; stroke: var(--rose);
      fill: none; stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .success-card h2 {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      margin-bottom: 10px; color: var(--text-1);
    }
    .success-card p {
      font-size: 14px; color: var(--text-2); line-height: 1.75;
      letter-spacing: -0.15px; margin-bottom: 28px;
    }
    .go-home {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--warm-black); color: #fff;
      text-decoration: none; border-radius: 10px;
      padding: 13px 28px; font-size: 14px; font-weight: 700;
      letter-spacing: -0.2px; transition: opacity 0.15s;
    }
    .go-home:hover { opacity: 0.8; }

    /* 애니메이션 */
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <span class="header-logo">talkey</span>
</header>

<div class="page">

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    출시 준비 중
  </div>

  <h1>현재 <em>서비스 준비 중</em>이에요</h1>

  <p class="desc">
    조금만 기다려 주세요!<br/>
    연락처를 남겨주시면<br/>
    <b>무료 체험 쿠폰과 함께</b> 출시 소식을<br/>
    가장 먼저 알려드릴게요.
  </p>

  <!-- 폼 -->
  <div class="form-card" id="form-card">
    <div class="form-title">출시 알림 신청</div>
    <form id="waitlist-form" onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" placeholder="홍길동" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="contact">연락처 (카카오톡 ID 또는 전화번호)</label>
        <input type="text" id="contact" placeholder="010-0000-0000 또는 카카오ID" required />
      </div>
      <button type="submit" class="submit-btn">출시 알림 &amp; 무료 쿠폰 받기</button>
    </form>
    <p class="form-note">수집한 정보는 출시 알림 발송 목적으로만 사용되며, 발송 후 즉시 파기됩니다.</p>
  </div>

  <!-- 제출 완료 -->
  <div class="success-card" id="success-card">
    <div class="success-icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h2>신청 완료!</h2>
    <p>출시되면 가장 먼저 알려드릴게요.<br/>무료 체험 쿠폰도 함께 보내드려요.</p>
    <a href="index.html" class="go-home">처음으로 돌아가기</a>
  </div>

</div>

<script>
  // ── talkey 이벤트 트래킹 ──
  (function () {
    const SID_KEY = 'talkey_sid';
    let sid = sessionStorage.getItem(SID_KEY);
    if (!sid) {
      sid = Date.now().toString(36) + Math.random().toString(36).slice(2);
      sessionStorage.setItem(SID_KEY, sid);
    }

    window._track = function (event, extra) {
      fetch('/api/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event, page: 'waiting', session_id: sid, ...extra }),
        keepalive: true,
      }).catch(() => {});
    };

    // 페이지 조회
    _track('page_view');
  })();

  function handleSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const contact = document.getElementById('contact').value.trim();
    if (!name || !contact) return;

    // 연락처 제출 이벤트 트래킹
    _track('form_submit');
    gtag('event', 'form_submit');
    gtag('event', 'conversion'); // GA4 전환 이벤트

    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-card').style.display = 'block';
  }
</script>
</body>
</html>
